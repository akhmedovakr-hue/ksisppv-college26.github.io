<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сдача отчета</title>
</head>
<body>
    <h1>Сдача учебного отчета</h1>
    
    <form action="https://formspree.io/f/xjgpzdnw" method="POST" enctype="multipart/form-data">
        <p>
            <label>ФИО студента:</label><br>
            <input type="text" name="name" required>
        </p>
        <p>
            <label>Номер группы:</label><br>
            <input type="text" name="group" required>
        </p>
        <p>
            <label>Файл с отчетом:</label><br>
            <input type="file" name="attachment" required>
        </p>
        <button type="submit">Отправить отчет</button>
    </form>
</body>
</html>
