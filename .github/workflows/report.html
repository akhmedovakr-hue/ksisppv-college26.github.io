<h1>Форма для сдачи отчета</h1>
<p>Заполните все поля и прикрепите файл с работой.</p>

<form action="https://formspree.io/f/xjgpzdnw" method="POST" enctype="multipart/form-data">
    <div>
        <label for="name">Ваше ФИО:</label><br>
        <input type="text" id="name" name="name" required>
    </div>
    <div>
        <label for="group">Номер группы:</label><br>
        <input type="text" id="group" name="group" required>
    </div>
    <div>
        <label for="report-file">Файл с отчетом:</label><br>
        <input type="file" id="report-file" name="attachment" accept=".pdf,.doc,.docx" required>
    </div>
    <button type="submit">Отправить отчет</button>
</form>
